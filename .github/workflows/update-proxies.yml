name: Update Proxies

on:
  schedule:
    - cron: '0 */2 * * *' # 每2小时运行一次
  workflow_dispatch: # 支持手动触发

jobs:
  update-proxies:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Get current month
        id: date
        run: echo "month=$(date +'%Y-%m')" >> $GITHUB_OUTPUT

      - name: Cache Python dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ steps.date.outputs.month }}-${{ hashFiles('proxy/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ steps.date.outputs.month }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r proxy/requirements.txt

      - name: Run proxy fetcher
        run: python proxy/fetcher.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add proxy/*.txt
          git commit -m "Update proxies [$(date +'%Y-%m-%d %H:%M:%S')]" || exit 0
          git push
